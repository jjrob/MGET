name: Build and test wheels

on:
  push:
    branches:
      - 'main'
    paths-ignore:
      - '.github/**'
      - 'badges/**'
      - 'doc/**'
      - 'README.md'
      - 'RELEASE_NOTES.md'
      - '.readthedocs.yaml'

  workflow_dispatch:  # Allows manual trigger


jobs:
  build_wheels:
    name: Build wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-24.04, windows-latest]
        # Python versions are specified in pyproject.toml

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
    
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install cibuildwheel
        run: python -m pip install cibuildwheel==3.4.1

      - name: Build wheels
        run: python -m cibuildwheel --output-dir wheelhouse
        env:
          CIBW_ARCHS: "auto64"        # 64-bit only
          CIBW_SKIP: "cp3??t-*"       # Skip free-threaded builds for now; we can enable them once we have the bandwidth to explore the issues and fully test them

      - uses: actions/upload-artifact@v6
        with:
          name: cibw-wheels-${{ matrix.os }}
          path: ./wheelhouse/*.whl

  build_sdist:
    name: Build source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Build sdist
        run: pipx run build --sdist

      - uses: actions/upload-artifact@v6
        with:
          name: sdist
          path: dist/*.tar.gz

  test_wheels_linux:
    name: Test wheel on ${{ matrix.os }} Python ${{ matrix.python-version }}
    needs: build_wheels
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04]
        python-version: ["3.9", "3.10", "3.11", "3.12"]   # ubuntu-24.04 has GDAL 3.8.4, which requires numpy 1.x, which was never built for Python 3.13 or later, so we can't add 3.13 here

    environment:
      name: "Test data products"

    steps:
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Display system information
        run: |
          echo "uname -a:"
          uname -a
          echo ""
          echo "hostnamectl:"
          hostnamectl
          echo ""
          echo "python3 --version:"
          python3 --version

      - name: Display GDAL versions available for installation
        run: |
          apt-cache policy gdal-bin gdal-data gdal-plugins libgdal-dev

      - name: Install apt-fast
        run: |
          sudo add-apt-repository ppa:apt-fast/stable
          sudo apt-get update -y
          sudo apt-get -y install apt-fast

      - name: Install GDAL
        run: |
          sudo apt-fast install -y gdal-bin gdal-data gdal-plugins libgdal-dev

      # ubuntu-24.04 provides GDAL 3.8.4. For these pip-built Python bindings,
      # we pin numpy<2 and disable build isolation so gdal_array is built
      # against the NumPy present in the test environment.

      - name: Install Python packages needed to install GDAL's Python bindings
        run: |
          python -m pip install --upgrade pip
          python -m pip install "numpy<2" "setuptools>=67" wheel
          python -c "import numpy; print('numpy:', numpy.__version__)"
          python -m pip list

      - name: Install GDAL's Python package
        run: |
          GDAL_VERSION_NEEDED=$(gdal-config --version)
          python -m pip install --no-build-isolation --no-cache-dir --force-reinstall "gdal==$GDAL_VERSION_NEEDED"
          echo ""
          echo "Verifying GDAL Python bindings"
          python -c "from osgeo import gdal; print(gdal.VersionInfo())"
          python -c "from osgeo import gdal_array; print('gdal_array OK')"

      - name: Download built wheels
        uses: actions/download-artifact@v8
        with:
          name: cibw-wheels-ubuntu-latest
          path: ./wheels

      - name: Install wheel
        run: |
          GEOECO_VERSION=$(ls ./wheels | grep -m 1 mget3 | sed 's/.*mget3-\(.*\)-cp.*-cp.*.whl/\1/')
          python -m pip install mget3==$GEOECO_VERSION --find-links=./wheels

      - name: Install Python packages needed to run tests
        run: |
          python -m pip install pytest python-dotenv

      # - name: Cache MATLAB Runtime
      #   id: cache-matlab-runtime-linux
      #   uses: actions/cache@v5
      #   with:
      #     path: ~/MATLAB_Runtime
      #     key: cache-matlab-runtime-r2026a-linux

      # - name: Download MATLAB Runtime
      #   if: ${{ steps.cache-matlab-runtime-linux.outputs.cache-hit != 'true' }}
      #   run: |
      #     curl -L -o MATLAB_Runtime.zip https://ssd.mathworks.com/supportfiles/downloads/R2026a/Release/0/deployment_files/installer/complete/glnxa64/MATLAB_Runtime_R2026a_glnxa64.zip
      #     mkdir ~/MATLAB_Runtime
      #     unzip MATLAB_Runtime.zip -d ~/MATLAB_Runtime

      # - name: Install MATLAB runtime
      #   run: |
      #     sudo ~/MATLAB_Runtime/install -agreeToLicense yes

      - name: Checkout source
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install libsodium-dev (needed by R plumber package)
        run: |
          sudo apt-get update && sudo apt-get install -y libsodium-dev          

      - name: Install R
        uses: r-lib/actions/setup-r@v2

      - name: Display R version
        run: |
          Rscript -e 'print(version)'

      - name: Run tests
        env:
          CMEMS_USERNAME: ${{ secrets.CMEMS_USERNAME }}
          CMEMS_PASSWORD: ${{ secrets.CMEMS_PASSWORD }}
          NASA_EARTHDATA_USERNAME: ${{ secrets.NASA_EARTHDATA_USERNAME }}
          NASA_EARTHDATA_PASSWORD: ${{ secrets.NASA_EARTHDATA_PASSWORD }}
        run: |
          python -m pytest -rs ./test/GeoEco/

  test_wheels_windows:
    name: Test wheel on ${{ matrix.os }} Python ${{ matrix.python-version }}
    needs: build_wheels
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # As of this writing (September 2024), the available Windows runners were
        # windows-2022, windows-2019, and windows-latest, which was equivalent to
        # windows-2022. No desktop images (e.g. Windows 10 or 11) were available.
        # Because Windows 2019 and 2022 are both based on Windows 10, there's not
        # much of an advantage to testing on both 2019 and 2022. Therefore, we are
        # just running this job on windows-latest.
        os: [windows-latest]
        python-version: ["3.13"]     # Our minimum on Windows is currently 3.13; we support later versions but pyhdf is not currently available for 3.14 so we limit testing to 3.13

    environment:
      name: "Test data products"

    steps:
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      # Note: this checkout apparently needs to happen before the
      # actions/cache below or the actions/cache won't work. so I'm moving it
      # up, even though it is not actually needed until just before the "Run
      # tests" step.

      - name: Checkout source
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Cache GDAL wheels from cgohlke/geospatial-wheels
        id: cache-GDAL-wheels
        uses: actions/cache@v5
        with:
          path: GDAL_wheels
          key: cache-gdal-3.12.2-win_amd64-wheels

      - name: Download GDAL wheels from cgohlke/geospatial-wheels
        if: ${{ steps.cache-GDAL-wheels.outputs.cache-hit != 'true' }}
        run: |
          mkdir GDAL_wheels
          curl -L -o GDAL_wheels\\gdal-3.12.2-cp313-cp313-win_amd64.whl https://github.com/cgohlke/geospatial-wheels/releases/download/v2026.2.26/gdal-3.12.2-cp313-cp313-win_amd64.whl
          curl -L -o GDAL_wheels\\gdal-3.12.2-cp314-cp314-win_amd64.whl https://github.com/cgohlke/geospatial-wheels/releases/download/v2026.2.26/gdal-3.12.2-cp314-cp314-win_amd64.whl

      - name: Install GDAL wheel
        shell: bash   # Yes, bash on Windows
        run: |
          python -m pip install -U pip
          python -m pip install -U setuptools wheel numpy
          python -m pip install gdal==3.12.2 --find-links=GDAL_wheels
          echo ""
          echo "Importing GDAL's Python bindings and printing gdal.VersionInfo()"
          python -c "from osgeo import gdal, gdal_array; print(gdal.VersionInfo())"

      - name: Download built wheels
        uses: actions/download-artifact@v8
        with:
          name: cibw-wheels-windows-latest
          path: wheels

      - name: Install wheel
        shell: pwsh
        run: |
          $env:MGET_VERSION = python -c "import glob; import os; files = glob.glob(os.path.join('wheels', 'mget3-*.whl')); print(os.path.basename(files[0]).split('-')[1])"
          python -m pip install mget3==$env:MGET_VERSION --find-links=wheels

      - name: Install Python packages needed to run tests
        run: |
          python -m pip install pytest python-dotenv

      - name: Cache MATLAB Runtime
        id: cache-matlab-runtime-windows
        uses: actions/cache@v5
        with:
          path: MATLAB_Runtime
          key: cache-matlab-runtime-r2026a-windows

      - name: Download MATLAB Runtime
        if: ${{ steps.cache-matlab-runtime-windows.outputs.cache-hit != 'true' }}
        shell: pwsh
        run: |
          curl -L -o MATLAB_Runtime.zip https://ssd.mathworks.com/supportfiles/downloads/R2026a/Release/0/deployment_files/installer/complete/win64/MATLAB_Runtime_R2026a_win64.zip
          Write-Host "Decompressing downloaded MATLAB_Runtime.zip"
          Expand-Archive -Path "MATLAB_Runtime.zip" -DestinationPath "MATLAB_Runtime"
          Remove-Item "MATLAB_Runtime.zip"
          Write-Host "Checking extracted contents"
          Get-ChildItem MATLAB_Runtime

      - name: Install MATLAB runtime
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'

          Write-Host "Searching for setup.exe under MATLAB_Runtime"
          $setup = Get-ChildItem -Path "MATLAB_Runtime" -Recurse -Filter "setup.exe" -File |
            Select-Object -First 1 -ExpandProperty FullName

          if (-not $setup) {
            throw "Could not find setup.exe under MATLAB_Runtime"
          }

          $log = Join-Path $env:RUNNER_TEMP "matlab-runtime-install.log"

          Write-Host "Using installer: $setup"
          Write-Host "Installer log: $log"

          if (Test-Path $log) {
            Remove-Item $log -Force
          }

          $proc = Start-Process `
            -FilePath $setup `
            -ArgumentList @(
              '-agreeToLicense', 'yes',
              '-outputFile', $log
            ) `
            -Wait `
            -PassThru

          Write-Host "Installer exit code: $($proc.ExitCode)"

          if (Test-Path $log) {
            Write-Host "----- MATLAB Runtime installer log begin -----"
            Get-Content $log
            Write-Host "----- MATLAB Runtime installer log end -----"
          }
          else {
            Write-Host "Expected installer log was not created at: $log"
            Write-Host "TEMP = $env:TEMP"
            Write-Host "RUNNER_TEMP = $env:RUNNER_TEMP"
            Write-Host "Searching TEMP for MathWorks logs..."
            Get-ChildItem $env:TEMP -Filter "mathworks*.log" -ErrorAction SilentlyContinue |
              Sort-Object LastWriteTime -Descending |
              Format-Table FullName, LastWriteTime, Length -AutoSize
            throw "MATLAB Runtime installer did not produce the expected log file."
          }

          if ($proc.ExitCode -ne 0) {
            throw "MATLAB Runtime installer failed with exit code $($proc.ExitCode)"
          }

      - name: Install R
        uses: r-lib/actions/setup-r@v2

      - name: Display R version
        shell: cmd
        run: |
          Rscript -e "print(version)"

      - name: Run tests
        env:
          CMEMS_USERNAME: ${{ secrets.CMEMS_USERNAME }}
          CMEMS_PASSWORD: ${{ secrets.CMEMS_PASSWORD }}
          NASA_EARTHDATA_USERNAME: ${{ secrets.NASA_EARTHDATA_USERNAME }}
          NASA_EARTHDATA_PASSWORD: ${{ secrets.NASA_EARTHDATA_PASSWORD }}
        run: |
          python -m pytest -rs test\\GeoEco
